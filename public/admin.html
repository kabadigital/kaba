<script>

const API = "https://kaba-dev.onrender.com";

let tousLesBiens = [];
let currentId = null;

/* ================= SAFE API FETCH ================= */
async function apiFetch(url, options = {}) {
  try {
    const token = localStorage.getItem("token");

    const res = await fetch(url, {
      ...options,
      headers: {
        "Content-Type": "application/json",
        ...(options.headers || {}),
        Authorization: token ? `Bearer ${token}` : ""
      }
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      throw new Error(data.message || "Erreur serveur");
    }

    return data;

  } catch (err) {
    console.error("API ERROR:", err.message);
    alert(err.message);
    return null;
  }
}

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", () => {
  chargerDashboard();
  chargerUsers();
});

/* ================= DASHBOARD BIENS ================= */
async function chargerDashboard(){

  const biens = await apiFetch(`${API}/public/properties`);

  if(!biens) return;

  tousLesBiens = biens;

  document.getElementById("totalBiens").innerText = biens.length;

  afficherTable(biens);
}

/* ================= USERS ================= */
async function chargerUsers(){

  const users = await apiFetch(`${API}/agents`);

  if(!users) return;

  const table = document.getElementById("tableUsers");
  table.innerHTML = "";

  users.forEach(u => {

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${u.name}</td>
      <td>${u.email}</td>
      <td>${u.role}</td>
      <td>${u.isBanned ? "🚫 Banni" : "✅ Actif"}</td>
      <td>
        <button onclick="banUser('${u._id}')">
          ${u.isBanned ? "Débannir" : "Bannir"}
        </button>
      </td>
    `;

    table.appendChild(tr);

  });
}

/* ================= TABLE BIENS ================= */
function afficherTable(biens){

  const table = document.getElementById("tableBiens");
  table.innerHTML = "";

  biens.forEach(b => {

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${b.title}</td>
      <td>${b.city}</td>
      <td>${b.agentId?.name || "—"}</td>
      <td>
        <button onclick="ouvrirEdit('${b._id}')">Modifier</button>
        <button onclick="supprimer('${b._id}')">Supprimer</button>
      </td>
    `;

    table.appendChild(tr);

  });
}

/* ================= SEARCH ================= */
function filtrerBiens(){

  const value = document.getElementById("searchInput").value.toLowerCase();

  const resultats = tousLesBiens.filter(b =>
    b.title?.toLowerCase().includes(value) ||
    b.city?.toLowerCase().includes(value) ||
    b.agentId?.name?.toLowerCase().includes(value)
  );

  afficherTable(resultats);
}

/* ================= DELETE BIEN ================= */
async function supprimer(id){

  if(!confirm("Supprimer ce bien ?")) return;

  const data = await apiFetch(`${API}/properties/${id}`, {
    method: "DELETE"
  });

  if(data){
    alert("Bien supprimé");
    chargerDashboard();
  }
}

/* ================= BAN USER ================= */
async function banUser(id){

  const data = await apiFetch(`${API}/admin/ban/${id}`, {
    method: "PUT"
  });

  if(data){
    alert("Mise à jour OK");
    chargerUsers();
  }
}

/* ================= OPEN EDIT MODAL ================= */
function ouvrirEdit(id){

  const bien = tousLesBiens.find(b => b._id === id);
  if(!bien) return;

  currentId = id;

  document.getElementById("editTitle").value = bien.title || "";
  document.getElementById("editCity").value = bien.city || "";
  document.getElementById("editPrice").value = bien.price || "";

  document.getElementById("editModal").style.display = "flex";
}

/* ================= CLOSE MODAL ================= */
function closeModal(){
  document.getElementById("editModal").style.display = "none";
}

/* ================= SAVE EDIT ================= */
async function saveEdit(){

  const updated = {
    title: document.getElementById("editTitle").value,
    city: document.getElementById("editCity").value,
    price: document.getElementById("editPrice").value
  };

  const data = await apiFetch(`${API}/properties/${currentId}`, {
    method: "PUT",
    body: JSON.stringify(updated)
  });

  if(data){
    alert("Bien modifié !");
    closeModal();
    chargerDashboard();
  }
}

/* ================= CREATE ADMIN ================= */
async function createAdmin(){

  const name = document.getElementById("adminName").value;
  const email = document.getElementById("adminEmail").value;
  const password = document.getElementById("adminPassword").value;

  if(!name || !email || !password){
    alert("Remplis tous les champs");
    return;
  }

  const data = await apiFetch(`${API}/admin/create`, {
    method: "POST",
    body: JSON.stringify({ name, email, password })
  });

  if(data){
    alert("Admin créé !");
  }
}

</script>
